# ============================================================
# Family Locator — Docker Compose SOMENTE Infraestrutura
# ============================================================
# Use este arquivo para desenvolver localmente com a IDE,
# subindo apenas os serviços de infra (PostgreSQL, Redis, Kafka).
#
# Uso:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down -v
#
# A aplicação Spring Boot roda pela IDE/terminal apontando para
# localhost nas portas mapeadas:
#   PostgreSQL: localhost:5432
#   Redis:      localhost:6379
#   Kafka:      localhost:9092
#   Kafka UI:   http://localhost:8090
# ============================================================

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: fl-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_locator}
      POSTGRES_USER: ${POSTGRES_USER:-fl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fl_secret_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fl_user} -d ${POSTGRES_DB:-family_locator}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  redis:
    image: redis:7-alpine
    container_name: fl-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fl-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fl-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fl-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fl-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo '=========================================='
        echo 'Criando tópicos Kafka...'
        echo '=========================================='
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic location.events --partitions 6 --replication-factor 1 --config retention.ms=604800000 --config cleanup.policy=delete
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic geofence.events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic drive.events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic sos.events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.commands --partitions 3 --replication-factor 1 --config retention.ms=604800000
        echo '=========================================='
        echo 'Tópicos criados com sucesso!'
        kafka-topics --list --bootstrap-server kafka:29092
        echo '=========================================='
    networks:
      - fl-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fl-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: family-locator-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - fl-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local

networks:
  fl-network:
    driver: bridge
    name: fl-network
