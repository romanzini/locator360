            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/status:
    patch:
      tags: [Admin]
      summary: Bloquear/desbloquear conta de usuário
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserAccountStatusRequest"
      responses:
        "200":
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/flags:
    post:
      tags: [Admin]
      summary: Criar flag administrativa para usuário
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserFlagRequest"
      responses:
        "201":
          description: Flag criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFlag"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: Consultar logs de auditoria administrativa
      security:
        - BearerAuth: []
      parameters:
        - name: targetType
          in: query
          required: false
          schema:
            type: string
        - name: targetId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ######################################
    # SCHEMAS BÁSICOS
    ######################################
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: array
          items:
            type: string
      required: [code, message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        fullName:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        profilePhotoUrl:
          type: string
          format: uri
          nullable: true
        preferredLanguage:
          type: string
          example: pt-BR
        timezone:
          type: string
          example: America/Sao_Paulo
        distanceUnit:
          type: string
          enum: [KM, MILES]
        status:
          type: string
          enum: [ACTIVE, BLOCKED, PENDING_VERIFICATION]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        [
          id,
          fullName,
          preferredLanguage,
          timezone,
          distanceUnit,
          status,
          createdAt,
          updatedAt,
        ]
      example:
        id: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        email: "joao.silva@example.com"
        phoneNumber: "+5511999999999"
        fullName: "João da Silva"
        firstName: "João"
        lastName: "Silva"
        birthDate: "2005-03-10"
        gender: "MALE"
        profilePhotoUrl: "https://cdn.familysafe360.com/avatars/joao.jpg"
        preferredLanguage: "pt-BR"
        timezone: "America/Sao_Paulo"
        distanceUnit: "KM"
        status: "ACTIVE"
        createdAt: "2026-02-10T10:15:00Z"
        updatedAt: "2026-02-10T10:20:00Z"

    ######################################
    # AUTH
    ######################################
    RegisterWithEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
      required: [email, password, fullName]
      example:
        email: "maria.oliveira@example.com"
        password: "SenhaForte123!"
        fullName: "Maria Oliveira"

    RegisterWithPhoneRequest:
      type: object
      properties:
        phoneNumber:
          type: string
        verificationCode:
          type: string
        fullName:
          type: string
      required: [phoneNumber, verificationCode, fullName]

    LoginWithPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
      example:
        email: "maria.oliveira@example.com"
        password: "SenhaForte123!"

    LoginWithPhoneRequest:
      type: object
      properties:
        phoneNumber:
          type: string
        verificationCode:
          type: string
      required: [phoneNumber, verificationCode]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Tempo em segundos para expiração do access token
        user:
          $ref: "#/components/schemas/User"
      required: [accessToken, tokenType, expiresIn, user]
      example:
        accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.r..."
        tokenType: "Bearer"
        expiresIn: 3600
        user:
          id: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
          email: "joao.silva@example.com"
          fullName: "João da Silva"
          preferredLanguage: "pt-BR"
          timezone: "America/Sao_Paulo"
          distanceUnit: "KM"
          status: "ACTIVE"
          createdAt: "2026-02-10T10:15:00Z"
          updatedAt: "2026-02-10T10:20:00Z"

    UpdateUserProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
        profilePhotoUrl:
          type: string
          format: uri
        preferredLanguage:
          type: string
        timezone:
          type: string
        distanceUnit:
          type: string
          enum: [KM, MILES]
      additionalProperties: false

    ######################################
    # CÍRCULOS
    ######################################
    Circle:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        photoUrl:
          type: string
          format: uri
          nullable: true
        colorHex:
          type: string
          nullable: true
        privacyLevel:
          type: string
          enum: [OPEN_WITH_CODE, INVITE_ONLY]
        role:
          type: string
          enum: [ADMIN, MEMBER]
          description: Papel do usuário autenticado neste círculo
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, privacyLevel, role, createdAt, updatedAt]
      example:
        id: "c1f8a2c3-1111-4b22-9abc-000000000001"
        name: "Família Silva"
        description: "Círculo principal da família"
        photoUrl: "https://cdn.familysafe360.com/circles/familia-silva.png"
        colorHex: "#4CAF50"
        privacyLevel: "INVITE_ONLY"
        role: "ADMIN"
        createdAt: "2026-02-01T09:00:00Z"
        updatedAt: "2026-02-05T12:30:00Z"

    CreateCircleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          format: uri
        colorHex:
          type: string
        privacyLevel:
          type: string
          enum: [OPEN_WITH_CODE, INVITE_ONLY]
      required: [name]
      example:
        name: "Família Silva"
        description: "Grupo da família próxima"
        colorHex: "#4CAF50"
        privacyLevel: "INVITE_ONLY"

    UpdateCircleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          format: uri
        colorHex:
          type: string
        privacyLevel:
          type: string
          enum: [OPEN_WITH_CODE, INVITE_ONLY]
      additionalProperties: false

    CircleMember:
      type: object
      properties:
        userId:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [ADMIN, MEMBER]
        status:
          type: string
          enum: [ACTIVE, PENDING, REMOVED]
        joinedAt:
          type: string
          format: date-time
          nullable: true
      required: [userId, fullName, role, status]

    ######################################
    # LOCALIZAÇÃO
    ######################################
    Location:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        circleId:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        accuracyMeters:
          type: number
          format: double
          nullable: true
        speedMps:
          type: number
          format: double
          nullable: true
        headingDegrees:
          type: number
          format: double
          nullable: true
        altitudeMeters:
          type: number
          format: double
          nullable: true
        source:
          type: string
          enum: [GPS, NETWORK, FUSED]
        recordedAt:
          type: string
          format: date-time
        isMoving:
          type: boolean
        batteryLevel:
          type: integer
          nullable: true
      required: [id, userId, latitude, longitude, source, recordedAt]
      example:
        id: "loc-001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        latitude: -23.561414
        longitude: -46.655881
        accuracyMeters: 10.5
        speedMps: 0
        headingDegrees: 180
        altitudeMeters: 760
        source: "GPS"
        recordedAt: "2026-02-10T13:45:00Z"
        isMoving: false
        batteryLevel: 72

    LocationEventInput:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        accuracyMeters:
          type: number
          format: double
        speedMps:
          type: number
          format: double
        headingDegrees:
          type: number
          format: double
        altitudeMeters:
          type: number
          format: double
        source:
          type: string
          enum: [GPS, NETWORK, FUSED]
        recordedAt:
          type: string
          format: date-time
        isMoving:
          type: boolean
        batteryLevel:
          type: integer
      required: [latitude, longitude, source, recordedAt]
      example:
        latitude: -23.561414
        longitude: -46.655881
        accuracyMeters: 12.3
        speedMps: 5.5
        headingDegrees: 190
        altitudeMeters: 755
        source: "GPS"
        recordedAt: "2026-02-10T13:44:30Z"
        isMoving: true
        batteryLevel: 75

    ######################################
    # PLACES
    ######################################
    Place:
      type: object
      properties:
        id:
          type: string
        circleId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [HOME, SCHOOL, WORK, OTHER]
        addressText:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        radiusMeters:
          type: number
          format: double
        isActive:
          type: boolean
        createdByUserId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        [
          id,
          circleId,
          name,
          type,
          latitude,
          longitude,
          radiusMeters,
          isActive,
          createdByUserId,
          createdAt,
          updatedAt,
        ]
      example:
        id: "plc-001"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        name: "Casa"
        type: "HOME"
        addressText: "Rua Exemplo, 123, São Paulo - SP"
        latitude: -23.561000
        longitude: -46.656000
        radiusMeters: 120
        isActive: true
        createdByUserId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        createdAt: "2026-02-01T09:10:00Z"
        updatedAt: "2026-02-01T09:10:00Z"

    CreatePlaceRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [HOME, SCHOOL, WORK, OTHER]
        addressText:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        radiusMeters:
          type: number
          format: double
      required: [name, latitude, longitude, radiusMeters]
      example:
        name: "Escola do Pedro"
        type: "SCHOOL"
        addressText: "Av. das Escolas, 500, São Paulo - SP"
        latitude: -23.560500
        longitude: -46.650000
        radiusMeters: 150

    UpdatePlaceRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [HOME, SCHOOL, WORK, OTHER]
        addressText:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        radiusMeters:
          type: number
          format: double
        isActive:
          type: boolean
      additionalProperties: false

    ######################################
    # SOS
    ######################################
    SosEvent:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        circleId:
          type: string
        triggerType:
          type: string
          enum: [MANUAL, AUTO_COLLISION_DETECTED]
        locationId:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [OPEN, RESOLVED, CANCELLED]
        startedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, circleId, triggerType, status, startedAt]
      example:
        id: "sos-001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        triggerType: "MANUAL"
        locationId: "loc-001"
        message: "Preciso de ajuda"
        status: "OPEN"
        startedAt: "2026-02-10T14:00:00Z"
        resolvedAt: null
        cancelledAt: null

    CreateSosRequest:
      type: object
      properties:
        circleId:
          type: string
        location:
          $ref: "#/components/schemas/LocationEventInput"
        message:
          type: string
      required: [circleId]
      example:
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        location:
          latitude: -23.561414
          longitude: -46.655881
          source: "GPS"
          recordedAt: "2026-02-10T13:59:30Z"
        message: "Acidente na marginal"

    UpdateSosStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [RESOLVED, CANCELLED]
      required: [status]

    ######################################
    # DRIVING
    ######################################
    Drive:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        circleId:
          type: string
          nullable: true
        startLocationId:
          type: string
        endLocationId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        maxSpeedMps:
          type: number
        avgSpeedMps:
          type: number
        safetyScore:
          type: integer
          minimum: 0
          maximum: 100
        events:
          type: array
          description: Opcional, lista de eventos de direção associados
          items:
            $ref: "#/components/schemas/DriveEvent"
      required:
        [
          id,
          userId,
          startLocationId,
          endLocationId,
          startTime,
          endTime,
          distanceMeters,
          durationSeconds,
          safetyScore,
        ]
      example:
        id: "drv-001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        startLocationId: "loc-010"
        endLocationId: "loc-050"
        startTime: "2026-02-10T07:30:00Z"
        endTime: "2026-02-10T07:55:00Z"
        distanceMeters: 15400
        durationSeconds: 1500
        maxSpeedMps: 27.8
        avgSpeedMps: 10.2
        safetyScore: 92
        events:
          - id: "dre-001"
            driveId: "drv-001"
            userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
            eventType: "HARD_BRAKE"
            severity: "MEDIUM"
            locationId: "loc-030"
            speedMps: 18.0
            occurredAt: "2026-02-10T07:42:10Z"

    DriveEvent:
      type: object
      properties:
        id:
          type: string
        driveId:
          type: string
        userId:
          type: string
        eventType:
          type: string
          enum: [SPEEDING, HARD_BRAKE, HARD_ACCEL, HARD_TURN, PHONE_USAGE]
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        locationId:
          type: string
          nullable: true
        speedMps:
          type: number
          nullable: true
        occurredAt:
          type: string
          format: date-time
      required: [id, driveId, userId, eventType, severity, occurredAt]
      example:
        id: "dre-001"
        driveId: "drv-001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        eventType: "SPEEDING"
        severity: "HIGH"
        locationId: "loc-025"
        speedMps: 33.3
        occurredAt: "2026-02-10T07:40:00Z"

    DrivingSummary:
      type: object
      properties:
        totalDrives:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: integer
        averageSafetyScore:
          type: number
          nullable: true
        highRiskEventsCount:
          type: integer
      required:
        [
          totalDrives,
          totalDistanceMeters,
          totalDurationSeconds,
          highRiskEventsCount,
        ]
      example:
        totalDrives: 15
        totalDistanceMeters: 120000
        totalDurationSeconds: 10800
        averageSafetyScore: 88.5
        highRiskEventsCount: 3

    ######################################
    # CHAT & CHECK-INS
    ######################################
    CircleMessage:
      type: object
      properties:
        id:
          type: string
        circleId:
          type: string
        senderUserId:
          type: string
        messageText:
          type: string
        messageType:
          type: string
          enum: [TEXT, SYSTEM]
        attachedLocationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        [id, circleId, senderUserId, messageText, messageType, createdAt]
      example:
        id: "msg-001"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        senderUserId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        messageText: "Cheguei na escola"
        messageType: "TEXT"
        attachedLocationId: "loc-060"
        createdAt: "2026-02-10T10:05:00Z"

    CreateCircleMessageRequest:
      type: object
      properties:
        messageText:
          type: string
        attachedLocation:
          $ref: "#/components/schemas/LocationEventInput"
      required: [messageText]
      example:
        messageText: "Saí do trabalho, chego em 30 min"
        attachedLocation:
          latitude: -23.562000
          longitude: -46.658000
          source: "GPS"
          recordedAt: "2026-02-10T18:01:00Z"

    CircleMessageReceipt:
      type: object
      properties:
        messageId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [DELIVERED, READ]
        updatedAt:
          type: string
          format: date-time
      required: [messageId, userId, status, updatedAt]
      example:
        messageId: "msg-001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        status: "READ"
        updatedAt: "2026-02-10T10:06:30Z"

    UpdateCircleMessageReceiptStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [DELIVERED, READ]
      required: [status]
      example:
        status: "READ"

    Checkin:
      type: object
      properties:
        id:
          type: string
        circleId:
          type: string
        userId:
          type: string
        locationId:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, circleId, userId, locationId, message, createdAt]
      example:
        id: "chk-001"
        circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
        userId: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
        locationId: "loc-070"
        message: "Cheguei em casa, tudo bem"
        createdAt: "2026-02-10T19:10:00Z"

    CreateCheckinRequest:
      type: object
      properties:
        message:
          type: string
        location:
          $ref: "#/components/schemas/LocationEventInput"
      required: [message]
      example:
        message: "Cheguei na academia"
        location:
          latitude: -23.565000
          longitude: -46.660000
          source: "GPS"
          recordedAt: "2026-02-10T19:00:00Z"

    ######################################
    # NOTIFICAÇÕES & PREFERÊNCIAS
    ######################################
    NotificationPreferences:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        circleId:
          type: string
          nullable: true
        notifyPlaceEvents:
          type: boolean
        notifyDrives:
