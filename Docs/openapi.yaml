openapi: 3.0.3
info:
  title: Family Locator API
  description: |
    API REST para o aplicativo Family Locator.

    Escopo desta versão:
    - Autenticação e contas de usuário
    - Círculos e membros
    - Localização em tempo real e histórico
    - Lugares (geofences)
    - Direção (drives) com escopo CAR-only nesta versão
    - SOS (básico)
  x-release-notes:
    - date: 2026-02-20
      version: 0.1.0
      decisions:
        - "Driving v1: suporte apenas a mode = CAR"
  version: 0.1.0

servers:
  - url: https://api.familylocator.com/v1
    description: Servidor de produção (exemplo)
  - url: https://staging.api.familylocator.com/v1
    description: Servidor de homologação (exemplo)

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Operações de autenticação e sessão
  - name: Users
    description: Perfil do usuário autenticado
  - name: Circles
    description: Gestão de círculos e membros
  - name: Locations
    description: Localização em tempo real e histórico
  - name: Places
    description: Lugares e geofences
  - name: SOS
    description: Eventos de emergência (SOS)
  - name: Driving
    description: Viagens e relatórios de direção
  - name: Chat
    description: Mensagens em círculo
  - name: Checkins
    description: Check-ins manuais
  - name: Notifications
    description: Preferências e histórico de notificações
  - name: Plans
    description: Planos e assinaturas
  - name: Admin
    description: Operações administrativas (backoffice)

paths:
  ######################################
  # 1. AUTENTICAÇÃO
  ######################################
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de novo usuário
      description: Cria um novo usuário utilizando e-mail e senha ou telefone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/RegisterWithEmailRequest"
                - $ref: "#/components/schemas/RegisterWithPhoneRequest"
            examples:
              registerWithEmail:
                summary: Registro com e-mail e senha
                value:
                  email: "maria.oliveira@example.com"
                  password: "SenhaForte123!"
                  fullName: "Maria Oliveira"
              registerWithPhone:
                summary: Registro com telefone e código SMS
                value:
                  phoneNumber: "+5511999999999"
                  verificationCode: "123456"
                  fullName: "João da Silva"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.r..."
                tokenType: "Bearer"
                expiresIn: 3600
                user:
                  id: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
                  email: "maria.oliveira@example.com"
                  fullName: "Maria Oliveira"
                  preferredLanguage: "pt-BR"
                  timezone: "America/Sao_Paulo"
                  distanceUnit: "KM"
                  status: "ACTIVE"
                  createdAt: "2026-02-10T10:15:00Z"
                  updatedAt: "2026-02-10T10:15:00Z"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Autenticação por e-mail/senha ou telefone/código.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/LoginWithPasswordRequest"
                - $ref: "#/components/schemas/LoginWithPhoneRequest"
            examples:
              loginWithEmail:
                summary: Login via e-mail
                value:
                  email: "maria.oliveira@example.com"
                  password: "SenhaForte123!"
              loginWithPhone:
                summary: Login via telefone
                value:
                  phoneNumber: "+5511999999999"
                  verificationCode: "123456"
      responses:
        "200":
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.r..."
                tokenType: "Bearer"
                expiresIn: 3600
                user:
                  id: "6b0f9b54-0aaf-4f46-9f0a-123456789abc"
                  email: "maria.oliveira@example.com"
                  fullName: "Maria Oliveira"
                  preferredLanguage: "pt-BR"
                  timezone: "America/Sao_Paulo"
                  distanceUnit: "KM"
                  status: "ACTIVE"
                  createdAt: "2026-02-10T10:15:00Z"
                  updatedAt: "2026-02-10T10:20:00Z"
        "400":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Dados do usuário autenticado
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Usuário autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 2. USUÁRIO PERFIL
  ######################################
  /users/me:
    get:
      tags: [Users]
      summary: Obter perfil do usuário atual
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Perfil do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Users]
      summary: Atualizar perfil do usuário atual
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: Perfil atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 3. CÍRCULOS
  ######################################
  /circles:
    get:
      tags: [Circles]
      summary: Listar círculos do usuário atual
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de círculos dos quais o usuário faz parte
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Circle"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Circles]
      summary: Criar novo círculo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCircleRequest"
            example:
              name: "Família Silva"
              description: "Grupo da família próxima"
              colorHex: "#4CAF50"
              privacyLevel: "INVITE_ONLY"
      responses:
        "201":
          description: Círculo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Circle"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}:
    parameters:
      - name: circleId
        in: path
        required: true
        schema:
          type: string
        description: ID do círculo
    get:
      tags: [Circles]
      summary: Obter detalhes de um círculo
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detalhes do círculo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Circle"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Círculo não encontrado ou sem acesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Circles]
      summary: Atualizar círculo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCircleRequest"
      responses:
        "200":
          description: Círculo atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Circle"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão para alterar (não é admin do círculo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Circles]
      summary: Excluir círculo
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Excluído com sucesso
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão para excluir
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}/members:
    get:
      tags: [Circles]
      summary: Listar membros do círculo
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de membros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircleMember"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Círculo não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}/join:
    post:
      tags: [Circles]
      summary: Entrar em um círculo com código de convite
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inviteCode:
                  type: string
              required: [inviteCode]
      responses:
        "200":
          description: Ingresso no círculo bem-sucedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Circle"
        "400":
          description: Código inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 4. LOCALIZAÇÃO
  ######################################
  /locations/stream:
    post:
      tags: [Locations]
      summary: Enviar lote de eventos de localização
      description: |
        Endpoint usado pelo app mobile para enviar eventos de localização
        em lote, para reduzir overhead.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                circleId:
                  type: string
                  description: Círculo principal de contexto (opcional)
                events:
                  type: array
                  items:
                    $ref: "#/components/schemas/LocationEventInput"
              required: [events]
            example:
              circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
              events:
                - latitude: -23.561414
                  longitude: -46.655881
                  accuracyMeters: 10.5
                  speedMps: 0
                  headingDegrees: 180
                  altitudeMeters: 760
                  source: "GPS"
                  recordedAt: "2026-02-10T13:44:30Z"
                  isMoving: false
                  batteryLevel: 72
                - latitude: -23.561500
                  longitude: -46.655900
                  accuracyMeters: 11.0
                  speedMps: 1.2
                  headingDegrees: 182
                  altitudeMeters: 761
                  source: "GPS"
                  recordedAt: "2026-02-10T13:44:45Z"
                  isMoving: true
                  batteryLevel: 72
      responses:
        "202":
          description: Eventos aceitos para processamento
        "400":
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}/members/{memberId}/location:
    get:
      tags: [Locations]
      summary: Obter última localização conhecida de um membro em um círculo
      security:
        - BearerAuth: []
      parameters:
        - name: circleId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Última localização conhecida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Membro não encontrado no círculo ou sem localização
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}/members/{memberId}/locations/history:
    get:
      tags: [Locations]
      summary: Obter histórico de localização de um membro
      security:
        - BearerAuth: []
      parameters:
        - name: circleId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Início do intervalo (ISO 8601)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Fim do intervalo (ISO 8601)
      responses:
        "200":
          description: Lista de eventos de localização no intervalo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
        "400":
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 5. LUGARES (PLACES)
  ######################################
  /circles/{circleId}/places:
    get:
      tags: [Places]
      summary: Listar lugares de um círculo
      security:
        - BearerAuth: []
      parameters:
        - name: circleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de lugares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Place"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Places]
      summary: Criar lugar em um círculo
      security:
        - BearerAuth: []
      parameters:
        - name: circleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
            example:
              name: "Escola do Pedro"
              type: "SCHOOL"
              addressText: "Av. das Escolas, 500, São Paulo - SP"
              latitude: -23.560500
              longitude: -46.650000
              radiusMeters: 150
      responses:
        "201":
          description: Lugar criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circles/{circleId}/places/{placeId}:
    parameters:
      - name: circleId
        in: path
        required: true
        schema:
          type: string
      - name: placeId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Places]
      summary: Obter detalhes de um lugar
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detalhes do lugar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lugar não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Places]
      summary: Atualizar lugar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaceRequest"
      responses:
        "200":
          description: Lugar atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Places]
      summary: Excluir lugar
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Excluído com sucesso
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 6. SOS (BÁSICO)
  ######################################
  /sos:
    post:
      tags: [SOS]
      summary: Acionar SOS
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSosRequest"
            example:
              circleId: "c1f8a2c3-1111-4b22-9abc-000000000001"
              location:
                latitude: -23.561414
                longitude: -46.655881
                source: "GPS"
                recordedAt: "2026-02-10T13:59:30Z"
              message: "Acidente na marginal, preciso de ajuda"
      responses:
        "201":
          description: SOS criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosEvent"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sos/{sosId}:
    patch:
      tags: [SOS]
      summary: Atualizar status de SOS
      security:
        - BearerAuth: []
      parameters:
        - name: sosId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSosStatusRequest"
      responses:
        "200":
          description: SOS atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosEvent"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: SOS não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ######################################
  # 7. DRIVING (VIAGENS & RELATÓRIOS)
  ######################################
  /circles/{circleId}/members/{memberId}/drives:
    get:
      tags: [Driving]
      summary: Listar viagens (drives) de um membro em um círculo
      security:
        - BearerAuth: []
      parameters:
        - name: circleId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Início do intervalo (ISO 8601)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Fim do intervalo (ISO 8601)
      responses:
        "200":
          description: Lista de viagens no intervalo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drive"
        "400":
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drives/{driveId}:
    get:
      tags: [Driving]
      summary: Obter detalhes de uma viagem
      security:
        - BearerAuth: []
      parameters:
        - name: driveId
          in: path
          required: true
          schema:
            type: string
        - name: includeEvents
          in: query
          required: false
          schema:
            type: boolean
          description: Se verdadeiro, inclui eventos de direção dentro da viagem
      responses:
        "200":
          description: Detalhes da viagem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drive"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Viagem não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drives/{driveId}/events:
    get:
      tags: [Driving]
      summary: Listar eventos de direção em uma viagem
      security:
        - BearerAuth: []
      parameters:
        - name: driveId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de eventos de direção
          content:
